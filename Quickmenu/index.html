<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuickMenu</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">
        <!-- Splash Screen -->
        <div id="splash-screen">
            <img src="asset/Hamburguer_com_queijo_e_bacon-removebg-preview.png" alt="Burger" class="splash-burger img-float">
            
            <div class="splash-center">
                <img src="asset/Custom_QR_code-removebg-preview.png" alt="QR Code" class="qr-code">
                <h1 class="logo-text">QuickMenu</h1>
            </div>

            <img src="asset/3de568b91277dbfb620768e4d231764c-removebg-preview.png" alt="Tacos" onerror="this.src='asset/Tacos-viande-hachee-removebg-preview.png'" class="splash-taco img-float-delayed">
        </div>

        <!-- Main App Content -->
        <div id="main-content" style="display: none;">
            <!-- Header -->
            <header>
                <div class="logo">
                    QuickMenu
                    <img src="asset/chef_hat_24dp_2B2B2B_FILL0_wght400_GRAD0_opsz24.svg" alt="Chef Hat" width="24" height="24" class="chef-icon">
                </div>
            </header>

            <!-- Hero Section -->
            <section class="hero-section">
                <div class="hero-content">
                    <h1>Commandez. Dégustez. Recommencez.</h1>
                    <p>Découvrez nos meilleurs plats préparés avec passion.</p>
                </div>
                <img src="asset/Delicious_Burger-removebg-preview.png" alt="Delicious Burger" class="hero-image">
            </section>

            <!-- Categories -->
            <div class="categories-container">
                <ul class="categories" id="category-tabs">
                    <!-- Tabs generated by JS -->
                </ul>
            </div>

            <div class="category-divider"></div>

            <!-- Menu View -->
            <main class="menu-container">
                <h2 class="category-title" id="current-category-title">Sandwich</h2>
                <div class="grid" id="menu-grid">
                    <!-- Cards generated by JS -->
                </div>
            </main>

            <!-- Footer -->
            <footer class="app-footer">
                <div class="footer-content">
                    <div class="footer-logo">
                        QuickMenu 
                    </div>
                    <p class="footer-text">Découvrez nos savoureux plats, préparés avec passion et servis avec amour. La restauration rapide, mais avec du goût !</p>
                </div>
                <div class="footer-bottom">
                    <p>&copy; 2026 QuickMenu. Tous droits réservés.</p>
                </div>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
